{#
  PUT /api/v1/settings. Risk caps editable. `allow_naked=true` requires typing CONFIRM.
#}
<form
  class="settings-form"
  hx-put="/api/v1/settings"
  hx-ext="json-enc"
  hx-swap="none"
  id="settings-form"
>
  <div class="form-grid">
    <label class="field">
      <span>Hard ceiling (per-trade %)</span>
      <input type="number" step="0.01" min="0" max="0.5" name="max_risk_per_trade_pct" value="{{ settings.max_risk_per_trade_pct }}" required />
    </label>
    <label class="field">
      <span>Preferred (per-trade %)</span>
      <input type="number" step="0.01" min="0" max="0.5" name="preferred_max_risk_per_trade_pct" value="{{ settings.preferred_max_risk_per_trade_pct }}" required />
    </label>
    <label class="field">
      <span>Daily drawdown %</span>
      <input type="number" step="0.01" min="0" max="1" name="max_daily_drawdown_pct" value="{{ settings.max_daily_drawdown_pct }}" />
    </label>
    <label class="field">
      <span>Weekly drawdown %</span>
      <input type="number" step="0.01" min="0" max="1" name="max_weekly_drawdown_pct" value="{{ settings.max_weekly_drawdown_pct }}" />
    </label>
    <label class="field">
      <span>Max positions</span>
      <input type="number" min="1" max="50" name="max_positions" value="{{ settings.max_positions }}" />
    </label>
    <label class="field">
      <span>Max underlying alloc %</span>
      <input type="number" step="0.01" min="0" max="1" name="max_underlying_allocation_pct" value="{{ settings.max_underlying_allocation_pct }}" />
    </label>
    <label class="field">
      <span>Min DTE</span>
      <input type="number" min="0" max="365" name="min_dte_days" value="{{ settings.min_dte_days }}" />
    </label>
    <label class="field">
      <span>Max DTE</span>
      <input type="number" min="0" max="365" name="max_dte_days" value="{{ settings.max_dte_days }}" />
    </label>
    <label class="field">
      <span>IV spike threshold %</span>
      <input type="number" step="0.1" min="0" max="100" name="iv_spike_threshold_pct" value="{{ settings.iv_spike_threshold_pct }}" />
    </label>
    <label class="field">
      <span>Options approval tier</span>
      <select name="options_approval_tier">
        <option value="1" {% if settings.options_approval_tier == 1 %}selected{% endif %}>Tier 1</option>
        <option value="2" {% if settings.options_approval_tier == 2 %}selected{% endif %}>Tier 2</option>
        <option value="3" {% if settings.options_approval_tier == 3 %}selected{% endif %}>Tier 3</option>
      </select>
    </label>
  </div>

  <fieldset class="naked-gate">
    <legend>Naked options</legend>
    <label class="toggle">
      <input type="checkbox" name="allow_naked" id="allow-naked-toggle" value="true" {% if settings.allow_naked %}checked{% endif %} />
      <span>Allow naked strategies</span>
    </label>
    <label class="field confirm-field" id="confirm-field" hidden>
      <span>Type <code>CONFIRM</code> to enable</span>
      <input type="text" id="confirm-input" autocomplete="off" spellcheck="false" />
    </label>
  </fieldset>

  <button type="submit" class="btn btn-primary" id="settings-submit">Save settings</button>
</form>

<script>
(function wireSettingsForm() {
  const form = document.getElementById('settings-form');
  if (!form || form.dataset.wired) return;
  form.dataset.wired = '1';
  const toggle = document.getElementById('allow-naked-toggle');
  const confirmField = document.getElementById('confirm-field');
  const confirmInput = document.getElementById('confirm-input');
  const submit = document.getElementById('settings-submit');

  function sync() {
    const wantsNaked = !!toggle.checked;
    confirmField.hidden = !wantsNaked;
    const ok = !wantsNaked || (confirmInput.value.trim() === 'CONFIRM');
    submit.disabled = !ok;
    form.setAttribute('hx-headers', wantsNaked && ok ? '{"X-Confirm":"CONFIRM"}' : '{}');
  }
  toggle.addEventListener('change', sync);
  confirmInput.addEventListener('input', sync);
  sync();
})();
</script>
